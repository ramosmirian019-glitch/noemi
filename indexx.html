<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para Noe 💖</title>

  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: Arial;
      background: black;
      color: white;
      overflow: hidden;
    }

    h1 {
      margin-top: 80px;
      font-size: 40px;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
      margin: 20px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      transition: all 0.3s;
    }

    #si {
      background-color: red;
      color: white;
    }

    #no {
      background-color: gray;
      color: white;
      position: absolute;
    }

    .pantalla {
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .oculto {
      display: none;
    }

    .snorlax {
      width: 150px;
      margin-top: 20px;
    }

    .corazon {
      position: absolute;
      font-size: 20px;
      animation: flotar 5s linear infinite;
    }

    @keyframes flotar {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="pantalla">
  <h1>🏁 Preparando algo especial...</h1>
  <h2>Para NoeNoe 💖</h2>
</div>

<!-- CONTENIDO -->
<div id="contenido" class="oculto">
  <h1 id="texto">Noemí 🏎️💖<br>¿Quieres ser mi novia?</h1>

  <button id="si" onclick="aceptar()">ti 💘</button>
  <button id="no" onmouseover="cambiar()">ño 😢</button>

  <img class="snorlax" src="https://media.tenor.com/0h7y8pJ5n6kAAAAi/snorlax-pokemon.gif">
</div>

<script>
setTimeout(() => {
  document.getElementById("intro").classList.add("oculto");
  document.getElementById("contenido").classList.remove("oculto");
}, 3000);

let tamañoSi = 20;
let tamañoNo = 20;
let intentos = 0;

function cambiar() {
  const botonNo = document.getElementById("no");
  const botonSi = document.getElementById("si");
  const texto = document.getElementById("texto");

  intentos++;

  botonNo.style.left = Math.random() * window.innerWidth + "px";
  botonNo.style.top = Math.random() * window.innerHeight + "px";

  tamañoSi += 12;
  botonSi.style.fontSize = tamañoSi + "px";

  tamañoNo -= 2;
  botonNo.style.fontSize = tamañoNo + "px";

  if (intentos == 2) texto.innerText = "Solange… como Verstappen, no puedes perder esto 😏🏎️";
  if (intentos == 4) texto.innerText = "Snorlax dice que aceptes 😴💖";
  if (intentos == 6) texto.innerText = "Solo queda el sí, Solange 💘";
}

function aceptar() {
  document.body.innerHTML = `
    <h1>Noemí💖🏎️</h1>
    <h2>oda oda oda, t dedico unas palabras ti, poque te amo mucho 😍</h2>

    <p style="font-size:20px; padding:20px;">
      Quién diría que todo empezó jugando fli flai JAKSKJA br><br>
      Entre actis y guerra AKJSKA, te volviste alguien muy especial para mi, mas que una simple amiga 💖<br><br>
      Aunque estemos muy lejos, tú en Argentina 🇦🇷 y yo en Perú 🇵🇪,
     la verdad que contigo todo se siente más cerca ti? <br><br>
      Me gusta todo de ti, tu forma de ser, cómo eres conmigo, aunq aveces m dices q me mate :c 💕<br><br>
      Noemí… quiero intentar algo real contigo ti💘
    </p>

    <img src="https://media.tenor.com/0h7y8pJ5n6kAAAAi/snorlax-pokemon.gif" width="150">
  `;
}

// corazones
function crearCorazon() {
  const corazon = document.createElement("div");
  corazon.classList.add("corazon");
  corazon.innerText = "💖";

  corazon.style.left = Math.random() * window.innerWidth + "px";
  document.body.appendChild(corazon);

  setTimeout(() => corazon.remove(), 5000);
}

setInterval(crearCorazon, 300);
</script>

</body>
</html>
